name: Run e2e tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      PLANNER_IMAGE: migration-planner-api:e2e
      STREAMER_IMAGE: migration-event-streamer:e2e

    steps:
      - name: Checkout streamer code
        uses: actions/checkout@v7

      - name: Checkout migration-planner
        uses: actions/checkout@v7
        with:
          repository: kubev2v/migration-planner
          path: migration-planner

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Start Podman socket
        run: |
          systemctl --user enable --now podman.socket
          echo "PODMAN_SOCKET=unix://$XDG_RUNTIME_DIR/podman/podman.sock" >> $GITHUB_ENV

      - name: Build planner API container
        run: |
          cd migration-planner
          make migration-planner-api-container MIGRATION_PLANNER_IMAGE=migration-planner-api MIGRATION_PLANNER_IMAGE_TAG=e2e

      - name: Build streamer container
        run: podman build -t migration-event-streamer:e2e -f Containerfile .

      - name: Build e2e binary
        run: make build.e2e

      - name: Pull test images
        run: |
          podman pull docker.io/library/postgres:17
          podman pull docker.io/apache/kafka:4.3.1
          podman pull docker.io/library/elasticsearch:8.7.1

      - name: Run e2e tests
        run: |
          ./bin/e2e \
            -planner-image=${{ env.PLANNER_IMAGE }} \
            -streamer-image=${{ env.STREAMER_IMAGE }} \
            -podman-socket=${{ env.PODMAN_SOCKET }} \
            --ginkgo.v

      - name: Collect container logs on failure
        if: failure()
        run: |
          echo "=== Planner logs ==="
          podman logs e2e-streamer-test-planner 2>&1 || true
          echo "=== Streamer logs ==="
          podman logs e2e-streamer-test-streamer 2>&1 || true
          echo "=== Kafka logs ==="
          podman logs e2e-streamer-test-kafka 2>&1 || true
          echo "=== Elasticsearch logs ==="
          podman logs e2e-streamer-test-elasticsearch 2>&1 || true
          echo "=== Postgres logs ==="
          podman logs e2e-streamer-test-postgres 2>&1 || true

      - name: Cleanup containers
        if: always()
        run: make e2e.clean || true
