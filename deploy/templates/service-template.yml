apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: migration-event-streamer
parameters:
  - name: IMAGE_NAME
    value: quay.io/redhat-services-prod/assisted-migration-tenant/assisted-migration/migration-event-streamer
  - name: IMAGE_TAG
    value: latest
  - name: REPLICAS
    value: "2"
  - name: KAFKA_CLIENT_ID
    value: migration-event-streamer
  - name: MSK_SECRET_NAME
    value: assisted-migration-msk
  - name: MSK_CREDENTIALS_SECRET_NAME
    required: true
  - name: ES_SECRET_NAME
    value: assisted-migration-elasticsearch
  - name: ES_CREDENTIALS_SECRET_NAME
    required: true
  - name: LOG_LEVEL
    value: info
  - name: LOG_FORMAT
    value: json
  - name: METRICS_PORT
    value: "8080"

objects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: event-streamer-config
      annotations:
        qontract.recycle: "true"
    data:
      # TODO: // change the config.yaml according to the actual needed pipelines
      config.yml: |
        pipelines:
          - name: inventory
            type: inventory
            inputTopic: assisted.migrations.events.inventory
        router:
          inputTopic: assisted.migrations.events
          routes:
            - eventType: assisted.migrations.events.inventory
              topic: assisted.migrations.events.inventory
        elastic:
          indexPrefix: assisted_migrations
          indexes:
            - assisted_migrations_inventory

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: migration-event-streamer
    spec:
      selector:
        matchLabels:
          app: migration-event-streamer
      replicas: ${{REPLICAS}}
      template:
        metadata:
          labels:
            app: migration-event-streamer
        spec:
          containers:
            - name: migration-event-streamer
              image: ${IMAGE_NAME}:${IMAGE_TAG}
              imagePullPolicy: Always
              command: ["/app/streamer"]
              args: ["run", "--config", "/app/config.yml"]
              ports:
                - name: metrics
                  containerPort: ${{METRICS_PORT}}
                  protocol: TCP
              env:
                - name: STREAMER_KAFKA_BROKERS
                  valueFrom:
                    secretKeyRef:
                      name: ${MSK_SECRET_NAME}
                      key: bootstrap_brokers_sasl_scram
                - name: STREAMER_KAFKA_CLIENTID
                  value: ${KAFKA_CLIENT_ID}
                - name: STREAMER_KAFKA_TLS
                  value: "true"
                - name: STREAMER_KAFKA_SASLMECHANISM
                  value: SCRAM-SHA-512
                - name: STREAMER_KAFKA_SASLUSERNAME
                  valueFrom:
                    secretKeyRef:
                      name: ${MSK_CREDENTIALS_SECRET_NAME}
                      key: username
                - name: STREAMER_KAFKA_SASLPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ${MSK_CREDENTIALS_SECRET_NAME}
                      key: password
                - name: STREAMER_ELASTICSEARCH_HOST
                  valueFrom:
                    secretKeyRef:
                      name: ${ES_SECRET_NAME}
                      key: endpoint
                - name: STREAMER_ELASTICSEARCH_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: ${ES_CREDENTIALS_SECRET_NAME}
                      key: master_user_name
                - name: STREAMER_ELASTICSEARCH_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ${ES_CREDENTIALS_SECRET_NAME}
                      key: master_user_password
                - name: STREAMER_ELASTICSEARCH_SSLINSECURESKIPVERIFY
                  value: "false"
                - name: STREAMER_LOGFORMAT
                  value: ${LOG_FORMAT}
                - name: STREAMER_LOGLEVEL
                  value: ${LOG_LEVEL}
                - name: STREAMER_METRICSPORT
                  value: ${METRICS_PORT}
              volumeMounts:
                - name: migration-event-streamer-config
                  mountPath: /app/config.yml
                  subPath: config.yml
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: migration-event-streamer-config
              configMap:
                name: event-streamer-config
