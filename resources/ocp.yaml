apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: migration-event-streamer
parameters:
  - name: REPLICAS
    value: "2"
  - name: IMAGE_NAME
    value: quay.io/ctupangiu/migration-event-streamer
  - name: IMAGE_TAG
    value: latest
  # kafka
  - name: KAFKA_BROKER_1
    value: planner-kafka-bootstrap.planner.svc:9091
  - name: KAFKA_BROKER_2
    value: planner-kafka-bootstrap.planner.svc:9092
  - name: KAFKA_BROKER_3
    value: planner-kafka-bootstrap.planner.svc:9093
  - name: KAFKA_CLIENT_ID
    value: migration-event-streamer
  - name: KAFKA_USE_TLS
    value: "false"
  # elastic
  - name: ELASTIC_HOST
    value: https://elasticsearch-sample-es-http:9200 
  - name: ELASTIC_SECRET_NAME
    value: elasticsearch-sample-es-elastic-user
  - name: ELASTIC_USERNAME
    value: elastic

objects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: event-streamer-config
    data:
      config.yml: |
        pipelines:
          - assessment.created
          - assessment.deleted
          - partner_customer.updated
          - user_action.visited
          - user_action.assessment_shared
          - user_action.assessment_unshared
          - user_action.sizing_requested
          - user_action.complexity_estimated
          - user_action.time_estimated
          - user_action.ova_downloaded
        router:
          inputTopic: assisted.migrations.events
        kafka:
          brokers:
            - ${KAFKA_BROKER_1}
            - ${KAFKA_BROKER_2}
            - ${KAFKA_BROKER_3}
          clientID: ${KAFKA_CLIENT_ID}
          tls: ${KAFKA_USE_TLS}
        elastic:
          indexes:
            - assessment
            - datastore
            - os
            - partner_customer
            - user_action
          host: ${ELASTIC_HOST} 
          sslInsecureSkipVerify: true

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: migration-event-streamer
    spec:
      selector:
        matchLabels:
          app: migration-event-streamer
      replicas: ${{REPLICAS}}
      template:
        metadata:
          labels:
            app: migration-event-streamer
        spec:
          containers:
            - name: migration-event-streamer
              image: ${IMAGE_NAME}:${IMAGE_TAG}
              imagePullPolicy: Always
              command: ["/app/streamer"]
              args: ["run", "--config", "config.yml"]
              env:
                - name: STREAMER_ELASTICSEARCH_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ${ELASTIC_SECRET_NAME}
                      key: elastic
                - name: STREAMER_ELASTICSEARCH_USERNAME
                  value: ${ELASTIC_USERNAME}
              volumeMounts:
                - name: migration-event-streamer-config
                  mountPath: /app/config.yml
                  subPath: config.yml
          volumes:
            - name: migration-event-streamer-config
              configMap:
                name: event-streamer-config
